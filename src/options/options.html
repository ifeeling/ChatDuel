<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>AIChatRoom 设置</title>
  <link rel="stylesheet" href="./options.css">
</head>
<body>
  <div class="container">
    <h1>AIChatRoom 设置</h1>

    <section class="section">
      <h2>启用的 AI 平台</h2>
      <label>
        <input type="checkbox" id="enable-chatgpt" checked>
        ChatGPT（chatgpt.com）
      </label>
      <label>
        <input type="checkbox" id="enable-gemini" checked>
        Gemini（gemini.google.com）
      </label>
    </section>

    <section class="section">
      <h2>适配器版本</h2>
      <p>选择器最后验证时间（用于诊断改版问题）：</p>
      <ul id="adapter-info" class="adapter-info">
        <li>加载中...</li>
      </ul>
    </section>

    <section class="section">
      <h2>历史记录</h2>
      <p id="history-stats">加载中...</p>
      <button id="btn-clear-history" class="danger">清空所有历史</button>
    </section>

    <section class="section">
      <h2>关于</h2>
      <p>AIChatRoom v0.1.0 — 多 AI 对照和搬运工具</p>
      <p>本扩展不调用任何 AI API，不抓取任何凭据，仅在您已登录的官方网页上模拟用户操作。</p>
    </section>
  </div>
  <script type="module" src="./options.ts"></script>
</body>
</html>
